global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'churnguard'

scrape_configs:
  # ── ChurnGuard FastAPI ─────────────────────────────────────────────────────
  - job_name: 'churnguard-api'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
